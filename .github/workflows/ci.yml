name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test CLI
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          mkdir -p /tmp/test-kb && cd /tmp/test-kb
          node $GITHUB_WORKSPACE/dist/cli.js init .
          node $GITHUB_WORKSPACE/dist/cli.js lint
          node $GITHUB_WORKSPACE/dist/cli.js search "test"
